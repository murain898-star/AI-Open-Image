     crossorigin="anonymous"></script>
    <script>
      // Suppress cross-origin "Script error." (often from external iframes like Firebase Auth)
      // from being reported to the AI Studio platform to avoid false positive error messages.
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.') {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);
      window.onerror = function(msg) {
        if (msg === 'Script error.') return true;
      };
    </script>
